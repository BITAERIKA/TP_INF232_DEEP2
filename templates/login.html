<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Yaoundé Ville Propre</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav class="navbar navbar-dark" style="background:#2E7D32;">
  <div class="container">
    <a class="navbar-brand" href="/"><img src="/static/logo.svg" width="30"> Yaoundé Ville Propre</a>
    <button id="darkToggle" class="btn btn-outline-light btn-sm" onclick="toggleDark()">🌓</button>
  </div>
</nav>
<div class="d-flex align-items-center justify-content-center vh-100" style="background: var(--bg-color);">
    <div class="card p-4 shadow" style="width: 100%; max-width: 400px;">
        <h3 class="text-center">Connexion</h3>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }}">{{ msg }}</div>
          {% endfor %}
        {% endwith %}
        <form method="POST">
            <div class="mb-3"><input name="email" class="form-control" placeholder="Email" required></div>
            <div class="mb-3"><input type="password" name="password" class="form-control" placeholder="Mot de passe" required></div>
            <button class="btn btn-primary w-100">Se connecter</button>
        </form>
        <p class="mt-2 text-center"><a href="/register">Créer un compte citoyen</a> | <a href="/">Retour</a></p>
        <hr>
        <p class="text-muted small">Agent test : agent@yaounde.com / agent123</p>
    </div>
</div>
<script>
  function toggleDark() {
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('mode', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
  }
  if (localStorage.getItem('mode') === 'dark') document.body.classList.add('dark-mode');
</script>
</body>
</html>

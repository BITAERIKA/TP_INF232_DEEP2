<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Signaler une zone insalubre</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background:#2E7D32;">
  <div class="container">
    <a class="navbar-brand" href="/"><img src="/static/logo.svg" width="30"> Yaoundé Ville Propre</a>
    <div class="ms-auto">
        <a href="/" class="btn btn-outline-light btn-sm me-2">Accueil</a>
        <button id="darkToggle" class="btn btn-outline-light btn-sm" onclick="toggleDark()">🌓</button>
    </div>
  </div>
</nav>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card p-4 shadow-lg">
                <h2 class="mb-4"><i class="fas fa-exclamation-triangle text-warning"></i> Signaler une zone insalubre</h2>
                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% for cat, msg in messages %}
                    <div class="alert alert-{{ cat }}">{{ msg }}</div>
                  {% endfor %}
                {% endwith %}
                <form method="POST" enctype="multipart/form-data">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Quartier *</label>
                            <select name="quartier" class="form-select" required>
                                <option value="">Choisir un quartier...</option>
                                {% for q in quartiers %}
                                <option value="{{ q }}">{{ q }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Type d'insalubrité *</label>
                            <select name="type_insalubrite" class="form-select" required>
                                <option value="">Choisir le type...</option>
                                {% for t in types %}
                                <option value="{{ t }}">{{ t }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="mt-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3" placeholder="Décrivez brièvement la situation..."></textarea>
                    </div>
                    <div class="row mt-3">
                        <div class="col-md-6">
                            <label class="form-label">Photo de la zone</label>
                            <input type="file" name="image" class="form-control" accept="image/*">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Date du constat</label>
                            <input type="date" name="date_signalement" class="form-control" value="{{ today }}" required>
                        </div>
                    </div>
                    <div class="mt-3">
                        <label class="form-label">Votre email (optionnel, pour recevoir un suivi)</label>
                        <input type="email" name="email" class="form-control" placeholder="vous@exemple.com">
                    </div>
                    <div class="mt-4 d-grid">
                        <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-paper-plane"></i> Envoyer le signalement</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
  function toggleDark() {
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('mode', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
  }
  if (localStorage.getItem('mode') === 'dark') document.body.classList.add('dark-mode');
</script>
</body>
</html>
